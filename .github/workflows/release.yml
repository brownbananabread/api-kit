name: Release

# on:
#   push:
#     branches: [main]
on: workflow_dispatch

jobs:
  release:
    if: ${{ !startsWith(github.event.head_commit.message, 'Release:') }}
    name: Bump Version & Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SYSTEMCI_APP_ID }}
          private-key: ${{ secrets.SYSTEMCI_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Get current version
        id: version
        run: |
          CURRENT=$(node -e "console.log(require('./package.json').version)")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          IFS='.' read -r major minor patch <<< "$CURRENT"
          NEW_PATCH=$((patch + 1))
          NEW_VERSION="${major}.${minor}.${NEW_PATCH}"
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping version: $CURRENT -> $NEW_VERSION"

      - name: Update package.json
        run: npm version ${{ steps.version.outputs.new }} --no-git-tag-version --allow-same-version

      - name: Generate changelog entry
        id: changelog
        run: |
          TAG="v${{ steps.version.outputs.current }}"
          NEW_TAG="v${{ steps.version.outputs.new }}"
          DATE=$(date +%Y-%m-%d)

          # Get commits since last tag (or all commits if no tags exist)
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            COMMITS=$(git log "$TAG"..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Build changelog entry
          ENTRY="## ${NEW_TAG} (${DATE})"$'\n\n'"${COMMITS}"

          # Write to file for later use
          echo "$ENTRY" > /tmp/changelog-entry.txt

          # Save for GitHub release body
          {
            echo "body<<CHANGELOG_EOF"
            echo "$ENTRY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        run: |
          ENTRY=$(cat /tmp/changelog-entry.txt)
          if [ -f CHANGELOG.md ]; then
            echo "${ENTRY}"$'\n\n'"$(cat CHANGELOG.md)" > CHANGELOG.md
          else
            echo "# Changelog"$'\n\n'"${ENTRY}" > CHANGELOG.md
          fi

      - name: Commit and tag
        run: |
          git config user.name "systemci[bot]"
          git config user.email "${{ vars.SYSTEMCI_APP_ID }}+systemci[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "Release: v${{ steps.version.outputs.new }} [skip ci]"
          git tag "v${{ steps.version.outputs.new }}"
          git push origin main --follow-tags

      - name: Create GitHub Release
        uses: actions/github-script@v7
        env:
          RELEASE_BODY: ${{ steps.changelog.outputs.body }}
          RELEASE_TAG: v${{ steps.version.outputs.new }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.RELEASE_TAG,
              name: process.env.RELEASE_TAG,
              body: process.env.RELEASE_BODY,
              draft: false,
              prerelease: false
            });
